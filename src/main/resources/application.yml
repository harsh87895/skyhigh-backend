spring:
  application:
    name: skyhigh-core

  # PostgreSQL Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/skyhigh_db
    username: skyhigh_user
    password: skyhigh_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate  # Use Flyway for migrations
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20

  # Flyway Database Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis Cache Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 2000  # 2 seconds for seat map cache

# Application-Specific Configuration
app:
  seat-hold:
    duration-seconds: 120  # 2 minutes
    expiration-job-rate: 10000  # Run every 10 seconds

  baggage:
    max-free-weight: 25.0  # kg
    fee-per-kg: 10.0  # USD per kg

# Logging Configuration
logging:
  level:
    root: INFO
    com.skyhigh.core: DEBUG
    org.springframework.cache: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true

---
# Docker Profile Configuration
spring:
  config:
    activate:
      on-profile: docker

  # Override datasource for Docker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/skyhigh_db}
    username: ${SPRING_DATASOURCE_USERNAME:skyhigh_user}
    password: ${SPRING_DATASOURCE_PASSWORD:skyhigh_pass}

  # Override Redis for Docker
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

logging:
  level:
    root: INFO
    com.skyhigh.core: INFO

