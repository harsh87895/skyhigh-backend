version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: skyhigh-postgres
    environment:
      POSTGRES_DB: skyhigh_db
      POSTGRES_USER: skyhigh_user
      POSTGRES_PASSWORD: skyhigh_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - skyhigh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyhigh_user -d skyhigh_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: skyhigh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skyhigh-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skyhigh-app
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skyhigh_db
      SPRING_DATASOURCE_USERNAME: skyhigh_user
      SPRING_DATASOURCE_PASSWORD: skyhigh_pass

      # Redis Configuration
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # Application Configuration
      SPRING_PROFILES_ACTIVE: docker

      # JVM Options
      JAVA_OPTS: -Xmx512m -Xms256m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skyhigh-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  skyhigh-network:
    driver: bridge
